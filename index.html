<!DOCTYPE html>
<html>

<!-- HEAD -->
<head>
    <title>TheVibezMachine</title>
    <link href="styles.css" rel="stylesheet" />
</head>

<!-- BODY -->
<body>
    
    <div id="app">

        <!-- Blades -->
        <div class="bladeStrip activeBlade" id="blade-library">
            <div class="activeIndicator"></div>
            <div class="labelBorder">
                <div class="bladeLabel">Library</div>
            </div>
        </div>
        <div class="bladeStrip" id="blade-explore">
            <div class="activeIndicator"></div>
            <div class="labelBorder">
                <div class="bladeLabel">Explore</div>
            </div>
        </div>
        <div class="bladeStrip" id="blade-visualizer">
            <div class="activeIndicator"></div>
            <div class="labelBorder">
                <div class="bladeLabel">Visualizer</div>
            </div>
        </div>
        <div class="bladeStrip" id="blade-settings">
            <div class="activeIndicator"></div>
            <div class="labelBorder">
                <div class="bladeLabel">Settings</div>
            </div>
        </div>

        <!-- Content -->
        <div id="content">

            <!-- Library -->
            <div class="tab active" id="library">
                <div class="items">
                </div>
            </div>

            <!-- Explore -->
            <div class="tab" id="explore">
                <div class="items"></div>
            </div>

            <!-- Visualizer-->
            <div class="tab" id="visualizer">
                <div class="items"></div>
            </div>

            <!-- Settings -->
            <div class="tab" id="settings">
                <div class="items">
                    <div id="libPath">
                        <label>Change library path:</label>
                        <textarea id="path"></textarea>
                        <button id=applyPath>Apply Path</button>
                        <button id="btn-open">Open Files</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Player -->
    <footer>
        <div id="player">
            <div id="track-info">
                <span id="track-name">No track loaded</span>
            </div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="time-row">
                <span id="current-time">0:00</span>
                <span id="divider">/</span>
                <span id="duration">0:00</span>
            </div>
            <div id="controls">
                <button id="btn-prev">⏮</button>
                <button id="btn-play">▶</button>
                <button id="btn-next">⏭</button>
            </div>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
    </footer>

    <script src="ui.js"></script>
    <script src="library.js"></script>
    <script src="player.js"></script>

</body>

</html>
