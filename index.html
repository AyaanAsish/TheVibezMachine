<!doctype html>
<html>
<!-- HEAD -->

<head>
    <title>TheVibezMachine</title>
    <link href="styles.css" rel="stylesheet" />
    <script>
      // Fast-path: apply cached theme tokens before body paints.
      // theme.js reconciles with the file-backed config asynchronously.
      (function() {
        var defaults = {
          "--blade": "#b094c7",
          "--blade-active": "#483666",
          "--accent": "#e2c044",
          "--accent-dark": "#d4b13e",
          "--card": "#2a2a2a",
          "--body": "#000000",
          "--text": "#ffffff",
          "--text-muted": "#888888"
        };
        try {
          var c = localStorage.getItem('tvm-theme-cache');
          var t = c ? JSON.parse(c).tokens : defaults;
          for (var k in t) document.documentElement.style.setProperty(k, t[k]);
        } catch (e) {
          for (var k in defaults) document.documentElement.style.setProperty(k, defaults[k]);
        }

        var spacingDefaults = {
          "--grid-gap": "40px"
        };
        try {
          var sc = localStorage.getItem('tvm-spacing-cache');
          var st = sc ? JSON.parse(sc).tokens : spacingDefaults;
          document.documentElement.style.removeProperty('--tracklist-gap');
          document.documentElement.style.removeProperty('--card-padding');
          document.documentElement.style.removeProperty('--settings-gap');
          document.documentElement.style.removeProperty('--library-grid-gap');
          document.documentElement.style.removeProperty('--library-tracklist-gap');
          document.documentElement.style.removeProperty('--library-card-padding');
          document.documentElement.style.removeProperty('--explore-grid-gap');
          document.documentElement.style.removeProperty('--explore-tracklist-gap');
          document.documentElement.style.removeProperty('--explore-card-padding');
          for (var k in st) document.documentElement.style.setProperty(k, st[k]);
        } catch (e) {
          for (var k in spacingDefaults) document.documentElement.style.setProperty(k, spacingDefaults[k]);
        }
      })();
    </script>
</head>

<!-- BODY -->
<body>
    <div id="app">
        <!-- Blades -->
        <!-- Library -->
        <div class="bladeStrip activeBlade" id="blade-library">
            <div class="labelBorder">
                <div class="bladeLabel">Library</div>
            </div>
        </div>

        <!-- Explore -->
        <div class="bladeStrip" id="blade-explore">
            <div class="labelBorder">
                <div class="bladeLabel">Explore</div>
            </div>
        </div>

        <!-- Visualizer  -->
        <div class="bladeStrip" id="blade-visualizer">
            <div class="labelBorder">
                <div class="bladeLabel">Visualizer</div>
            </div>
        </div>

        <!-- Settings -->
        <div class="bladeStrip" id="blade-settings">
            <div class="labelBorder">
                <div class="bladeLabel">Settings</div>
            </div>
        </div>

        <!-- Content -->
        <div id="content">
            <!-- Library -->
            <div class="tab active" id="library">
                <div class="items">
                    <div class="library-grid"></div>
                    <div class="library-tracklist"></div>
                    <div class="library-album-info"></div>
                </div>
            </div>

            <!-- Explore -->
            <div class="tab" id="explore">
                <div class="items">
                    <div class="explore-browse">
                        <div id="explore-search-container">
                            <input type="text" id="explore-search" placeholder="Search Spotify..." />
                            <button id="explore-search-btn">Search</button>
                            <div id="explore-dropdown">
                                <div class="dropdown-results"></div>
                            </div>
                        </div>
                        <canvas id="explore-canvas"></canvas>
                    </div>
                    <div class="library-tracklist"></div>
                    <div class="library-album-info"></div>
                </div>
            </div>

        <!-- Visualizer-->
        <div class="tab" id="visualizer">
          <div class="items">
            <div id="preset-bar">
              <button id="preset-toggle">
                PRESET <span id="preset-current-name">—</span> ▾
              </button>
              <div id="preset-dropdown">
                <div id="preset-list"></div>
              </div>
            </div>
            <div class="visualizer-layer">
              <canvas id="visCanvas"></canvas>
            </div>
            <button id="fullscreen"></button>
          </div>
        </div>

            <!-- Settings -->
            <div class="tab" id="settings">
                <div class="items">
                    <!-- Pathing -->
                    <div id="libPath" class="settings-section">
                        <label class="section-heading">- Library -</label>
                        <label>Change library path</label>
                        <textarea id="path"></textarea>
                        <button id="applyPath">Apply Path</button>
                        <button id="btn-open">Open Files</button>
                        <button id="clearLibrary">Clear Library</button>
                        <label>Please Format Media: <b class="keyword">"Author - Title"</b></label>
                    </div>
                    <hr>
                    <!-- Spotify -->
                    <div id="spotifyAuth" class="settings-section">
                        <label class="section-heading">- Spotify -</label>
                        <label>Spotify Client ID</label>
                        <textarea id="spotifyClientId"></textarea>
                        <label>Spotify Client Secret</label>
                        <textarea id="spotifyClientSecret"></textarea>
                        <button id="spotifyConnect">Connect to Spotify</button>
                        <button id="spotifyDisconnect">Disconnect Spotify</button>
                    </div>
                    <hr>
                    <!-- UI -->
                    <div id="uiSettings" class="settings-section">
                        <label class="section-heading">- UI -</label>
                        <label>Colour Scheme</label>
                        <div id="theme-strip"></div>
                        <select id="theme-select"></select>
                        <label>Library Spacing — <span id="spacing-label" class="keyword">Default</span></label>
                        <div id="spacing-slider-wrap">
                          <div id="spacing-track">
                            <div id="spacing-fill"></div>
                            <div id="spacing-thumb"></div>
                          </div>
                          <div id="spacing-ticks">
                            <span>Compact</span>
                            <span>Default</span>
                            <span>Relaxed</span>
                          </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Player -->
    <footer>
        <div id="blur"></div>
        <div id="player-top">
            <div id="player-cover"><span class="no-cover">🎵</span></div>
            <div id="volume-container">
                <div class="sliderBar">
                    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
                </div>
                <div class="controlBtn" id="btn-mute"></div>
            </div>
        </div>
        <div id="track-info">
            <span id="track-name">No track loaded</span>
        </div>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <div id="controls">
            <div class="controlBtn" id="btn-prev"></div>
            <div id="time-row">
                <span id="current-time">0:00</span>
                <span>/</span>
                <span id="duration">0:00</span>
            </div>
            <div class="controlBtn" id="btn-play"></div>
            <div class="controlBtn" id="btn-next"></div>
        </div>
    </footer>
    <div id="footer-trigger">
        <span id="trigger-label">Now Playing</span>
    </div>
    <div id="toast" class="toast-hidden"></div>

    <!-- Scripts -->
    <script src="shared/constants.js"></script>
    <script src="tabScripts/theme.js"></script>
    <script src="tabScripts/spacing.js"></script>
    <script src="tabScripts/settings.js"></script>
    <script src="tabScripts/sharedUi.js"></script>
    <script src="tabScripts/ui.js"></script>
    <script src="tabScripts/library.js"></script>
    <script src="tabScripts/explore.js"></script>
    <script src="playerScripts/player.js"></script>
    <script src="./vendor/butterchurn.min.js"></script>
    <script src="./vendor/butterchurnPresets.min.js"></script>
    <script src="tabScripts/visualizer.js"></script>
    <script src="spotifyScripts/librespot-renderer.js"></script>
  </body>

</html>
